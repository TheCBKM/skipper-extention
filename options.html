<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skipper Options</title>
    <link rel="stylesheet" href="options.css">
    <script defer src="content/prime/options.js"></script>
    <script defer src="optionPage.js"></script>
    <script defer src="options-youtube.js"></script>
</head>
<body>
    <div class="container">
        <div class="brand">
            <img src="icons/48.png" alt="Skipper" class="brand-icon">
            <h1>Skipper</h1>
        </div>
        <h2 class="section-title">Prime Video</h2>
        <div class="option">
            <span class="label-text">Skip Prime Video ads</span>
            <label class="switch">
                <input type="checkbox" id="skipAds">
                <span class="slider"></span>
                <span class="label-off">OFF</span>
                <span class="label-on">ON</span>
            </label>
        </div>
        <h2 class="section-title">Hotstar</h2>
        <div class="option">
            <span class="label-text">Hotstar ad blocking</span>
            <span class="label-text status">Always on</span>
        </div>
        <h2 class="section-title">YouTube</h2>
        <div class="option">
            <span class="label-text">Fast-forward creator promos</span>
            <label class="switch">
                <input type="checkbox" id="ccOption">
                <span class="slider"></span>
                <span class="label-off">OFF</span>
                <span class="label-on">ON</span>
            </label>
        </div>
        <div class="option">
            <span class="label-text">Fast-forward YouTube ads</span>
            <label class="switch">
                <input type="checkbox" id="yOption">
                <span class="slider"></span>
                <span class="label-off">OFF</span>
                <span class="label-on">ON</span>
            </label>
        </div>
    </div>
</body>
</html>
